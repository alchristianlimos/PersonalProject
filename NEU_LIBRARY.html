<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEU Library – Visitor Log System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f0f4f8; }
  input, select, button { font-family: Georgia, serif; }
  @keyframes pop { 0%{transform:scale(0)} 80%{transform:scale(1.15)} 100%{transform:scale(1)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #f0f4f8; }
  ::-webkit-scrollbar-thumb { background: #ccd; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Seed Data ──────────────────────────────────────────────────────────────
let VISITORS = [
  { id:1, rfid:"24-10845-559", name:"Maria Santos",    email:"msantos@neu.edu.ph",   program:"BSIT",        type:"student",  blocked:false },
  { id:2, rfid:"24-10846-112", name:"Juan dela Cruz",  email:"jdelacruz@neu.edu.ph", program:"BSCS",        type:"student",  blocked:false },
  { id:3, rfid:"21-30001-001", name:"Prof. Reyes",     email:"preyes@neu.edu.ph",    program:"Faculty-CIT", type:"faculty",  blocked:false },
  { id:4, rfid:"23-10933-774", name:"Ana Gomez",       email:"agomez@neu.edu.ph",    program:"BSA",         type:"student",  blocked:false },
  { id:5, rfid:"22-40012-338", name:"Carlos Bautista", email:"cbautista@neu.edu.ph", program:"Admin Staff", type:"employee", blocked:false  },
  { id:6, rfid:"24-10847-205", name:"Liza Reyes",      email:"lreyes@neu.edu.ph",    program:"BSEE",        type:"student",  blocked:false },
];

const REASONS = ["Reading","Researching","Use of computer","Meeting","Borrowing books","Study group"];

const makeSeedLogs = () => {
  const logs = [];
  const now = new Date();
  for (let i = 0; i < 40; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - Math.floor(Math.random() * 30));
    d.setHours(8 + Math.floor(Math.random() * 10), Math.floor(Math.random() * 60));
    const v = VISITORS[Math.floor(Math.random() * VISITORS.length)];
    if (!v.blocked) {
      logs.push({ id: i+1, visitorId: v.id, name: v.name, program: v.program,
        type: v.type, reason: REASONS[Math.floor(Math.random() * REASONS.length)],
        timestamp: d.toISOString() });
    }
  }
  return logs.sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp));
};

// ── Helpers ────────────────────────────────────────────────────────────────
const fmt = iso => {
  const d = new Date(iso);
  return d.toLocaleDateString("en-PH",{month:"short",day:"numeric",year:"numeric"})
       + " " + d.toLocaleTimeString("en-PH",{hour:"2-digit",minute:"2-digit"});
};
const isToday   = iso => new Date(iso).toDateString() === new Date().toDateString();
const isThisWeek  = iso => (new Date()-new Date(iso))/(86400000) <= 7;
const isThisMonth = iso => { const d=new Date(iso),n=new Date(); return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear(); };

const badge = (label, type) => {
  const colors = { student:"#1a73e8", faculty:"#0d7c5f", employee:"#7b2d8b",
                   active:"#0d7c5f", blocked:"#c0392b", blue:"#1a73e8" };
  const bg = colors[type] || colors[label?.toLowerCase()] || "#555";
  return <span style={{background:bg,color:"#fff",padding:"3px 11px",borderRadius:20,
    fontSize:11,fontWeight:700,letterSpacing:.5,textTransform:"uppercase",whiteSpace:"nowrap"}}>{label}</span>;
};

const exportPDF = (logs, title) => {
  const w = window.open("","_blank");
  const rows = logs.map(l =>
    `<tr><td>${l.name}</td><td>${l.program}</td><td>${l.type}</td><td>${l.reason}</td><td>${fmt(l.timestamp)}</td></tr>`
  ).join("");
  w.document.write(`<!DOCTYPE html><html><head><title>${title}</title><style>
    body{font-family:Georgia,serif;padding:2rem;color:#1a1a2e}
    h1{color:#0d3b66;border-bottom:2px solid #0d3b66;padding-bottom:.5rem;margin-bottom:.5rem}
    .meta{color:#666;font-size:.85rem;margin-bottom:1.5rem}
    table{width:100%;border-collapse:collapse}
    th{background:#0d3b66;color:#fff;padding:.5rem .75rem;text-align:left;font-size:.8rem;text-transform:uppercase}
    td{padding:.5rem .75rem;border-bottom:1px solid #ddd;font-size:.88rem}
    tr:nth-child(even) td{background:#f0f4f8}
  </style></head><body>
  <h1>NEU Library – ${title}</h1>
  <p class="meta">Generated: ${new Date().toLocaleString("en-PH")} &nbsp;|&nbsp; Records: ${logs.length}</p>
  <table><thead><tr><th>Name</th><th>Program</th><th>Type</th><th>Reason</th><th>Date &amp; Time</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <script>window.onload=()=>window.print();<\/script></body></html>`);
  w.document.close();
};

// ── Main App ───────────────────────────────────────────────────────────────
function App() {
  const [visitors, setVisitors]     = useState(VISITORS);
  const [logs, setLogs]             = useState(makeSeedLogs);
  const [screen, setScreen]         = useState("login"); // login | welcome | admin
  const [currentUser, setCurrentUser] = useState(null);

  // Login
  const [rfidInput, setRfidInput]   = useState("");
  const [visitorEmail, setVisitorEmail] = useState("");
  const [visitorName, setVisitorName] = useState("");
  const [yearLevel, setYearLevel]   = useState("");
  const [program, setProgram]       = useState("");
  const [reason, setReason]         = useState("");
  const [loginStep, setLoginStep]   = useState(1);
  const [loginErr, setLoginErr]     = useState("");
  const inputRef = useRef();

  // Admin
  const [adminTab, setAdminTab]     = useState("dashboard");
  const [searchQ, setSearchQ]       = useState("");
  const [period, setPeriod]         = useState("today");
  const [dateFrom, setDateFrom]     = useState("");
  const [dateTo, setDateTo]         = useState("");
  const [blockTarget, setBlockTarget] = useState(null);
  const [showAdminModal, setShowAdminModal] = useState(false);
  const [adminPass, setAdminPass]   = useState("");
  const [adminErr, setAdminErr]     = useState("");

  useEffect(() => {
    if (screen === "login" && loginStep === 1)
      setTimeout(() => inputRef.current?.focus(), 80);
  }, [screen, loginStep]);

  // ── Validators ────────────────────────────────────────────────────────
  const isValidRFID  = s => /^\d{2}-\d{5}-\d{3}$/.test(s.trim());
  const isValidEmail = s => /^[^\s@]+@neu\.edu\.ph$/i.test(s.trim());

  // ── Login handlers ────────────────────────────────────────────────────
  const submitID = () => {
    const q = rfidInput.trim();
    const ql = q.toLowerCase();

    // Check if blocked first (existing visitors)
    const existing = visitors.find(x => x.rfid.toLowerCase()===ql || x.email.toLowerCase()===ql);
    if (existing && existing.blocked) {
      setLoginErr(`⛔ Access Denied. ${existing.name} is not allowed to use the library.`);
      return;
    }
    if (existing) {
      setCurrentUser(existing);
      setVisitorEmail(existing.email || "");
      setVisitorName(existing.name || "");
      setLoginErr(""); setLoginStep(2); return;
    }

    // Validate format
    const validRFID  = isValidRFID(q);
    const validEmail = isValidEmail(q);
    if (!validRFID && !validEmail) {
      setLoginErr("Invalid input. Use RFID format 12-34567-890 or a @neu.edu.ph email.");
      return;
    }

    // Create a new visitor on the fly
    const isEmail = validEmail;
    const newVisitor = {
      id: Date.now(),
      rfid: isEmail ? "" : q,
      name: isEmail ? q.split("@")[0].replace(/\./g," ").replace(/\b\w/g,c=>c.toUpperCase()) : q,
      email: isEmail ? q : "",
      program: "Unknown",
      type: "student",
      blocked: false,
      autoCreated: true,
    };
    setVisitors(prev => [...prev, newVisitor]);
    setVisitorEmail(isEmail ? q : "");
    setVisitorName(newVisitor.name !== q ? newVisitor.name : "");
    setCurrentUser(newVisitor); setLoginErr(""); setLoginStep(2);
  };

  const NO_PROGRAM_LEVELS = ["Integrated School","Graduate","Staff","Faculty"];

  const submitReason = () => {
    if (!visitorName.trim()) { setLoginErr("Please enter your full name."); return; }
    if (!yearLevel)          { setLoginErr("Please select your year level."); return; }
    if (!NO_PROGRAM_LEVELS.includes(yearLevel) && !program.trim()) {
      setLoginErr("Please enter your program."); return;
    }
    if (!reason.trim())      { setLoginErr("Please enter your reason for visiting."); return; }

    const resolvedProgram = NO_PROGRAM_LEVELS.includes(yearLevel) ? "N/A" : program.trim();
    const resolvedType = ["Faculty","Staff"].includes(yearLevel) ? yearLevel.toLowerCase() : "student";
    const updatedVisitor = { ...currentUser, name: visitorName.trim(), email: visitorEmail.trim(), program: resolvedProgram, type: resolvedType };
    setVisitors(prev => prev.map(v => v.id===currentUser.id ? updatedVisitor : v));
    setCurrentUser(updatedVisitor);

    const log = { id: Date.now(), visitorId: currentUser.id,
      name: visitorName.trim(), email: visitorEmail.trim(), program: resolvedProgram,
      yearLevel, type: resolvedType,
      reason: reason.trim(), timestamp: new Date().toISOString() };
    setLogs(prev => [log, ...prev]);
    setScreen("welcome");
    setTimeout(() => {
      setScreen("login"); setRfidInput(""); setReason("");
      setVisitorName(""); setVisitorEmail(""); setYearLevel(""); setProgram("");
      setLoginStep(1); setCurrentUser(null); setLoginErr("");
    }, 4000);
  };

  const doAdminLogin = () => {
    if (adminPass === "admin123") {
      setShowAdminModal(false); setAdminPass(""); setAdminErr("");
      setAdminTab("dashboard"); setScreen("admin");
    } else setAdminErr("Incorrect password.");
  };

  const toggleBlock = id => {
    setVisitors(prev => prev.map(v => v.id===id ? {...v, blocked:!v.blocked} : v));
    setBlockTarget(null);
  };

  // ── Filtered logs ─────────────────────────────────────────────────────
  const filtered = logs.filter(l => {
    const q = searchQ.toLowerCase();
    const mq = !q || l.name.toLowerCase().includes(q) || l.program.toLowerCase().includes(q) || l.reason.toLowerCase().includes(q);
    let md = true;
    if (period==="today") md = isToday(l.timestamp);
    else if (period==="week") md = isThisWeek(l.timestamp);
    else if (period==="month") md = isThisMonth(l.timestamp);
    else if (period==="range" && dateFrom && dateTo)
      md = new Date(l.timestamp)>=new Date(dateFrom) && new Date(l.timestamp)<=new Date(dateTo+"T23:59:59");
    return mq && md;
  });

  const todayCt  = logs.filter(l=>isToday(l.timestamp)).length;
  const weekCt   = logs.filter(l=>isThisWeek(l.timestamp)).length;
  const monthCt  = logs.filter(l=>isThisMonth(l.timestamp)).length;
  const typeToday = logs.filter(l=>isToday(l.timestamp)).reduce((a,l)=>{a[l.type]=(a[l.type]||0)+1;return a},{});

  // ════════════════════════════════════════════════════════════════════════
  // SCREEN: LOGIN
  // ════════════════════════════════════════════════════════════════════════
  if (screen === "login") return (
    <div style={{minHeight:"100vh",background:"#0a0e1a",display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>

      {/* Grid BG */}
      <div style={{position:"absolute",inset:0,pointerEvents:"none",
        backgroundImage:"linear-gradient(rgba(26,115,232,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(26,115,232,.06) 1px,transparent 1px)",
        backgroundSize:"44px 44px"}}/>
      <div style={{position:"absolute",top:-180,left:-180,width:560,height:560,borderRadius:"50%",
        background:"radial-gradient(circle,rgba(26,115,232,.13) 0%,transparent 70%)",pointerEvents:"none"}}/>
      <div style={{position:"absolute",bottom:-120,right:-120,width:400,height:400,borderRadius:"50%",
        background:"radial-gradient(circle,rgba(13,124,95,.1) 0%,transparent 70%)",pointerEvents:"none"}}/>

      {/* Header */}
      <div style={{textAlign:"center",marginBottom:36,zIndex:1,animation:"fadeIn .6s ease"}}>
        <div style={{width:72,height:72,borderRadius:18,background:"linear-gradient(135deg,#1a73e8,#0d3b66)",
          display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",
          fontSize:34,boxShadow:"0 8px 32px rgba(26,115,232,.45)"}}>📚</div>
        <h1 style={{color:"#fff",fontSize:28,fontWeight:700,letterSpacing:-.5}}>NEU Library</h1>
        <p style={{color:"#607080",margin:"6px 0 0",fontSize:13,letterSpacing:2.5,textTransform:"uppercase"}}>
          Visitor Log System
        </p>
      </div>

      {/* Card */}
      <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",
        borderRadius:22,padding:"36px 40px",width:420,zIndex:1,
        backdropFilter:"blur(16px)",boxShadow:"0 24px 64px rgba(0,0,0,.45)",animation:"fadeIn .5s ease"}}>

        {loginStep === 1 ? (<>
          <p style={{color:"#7a99bb",fontSize:13,textAlign:"center",marginBottom:22,lineHeight:1.6}}>
            Tap your RFID card or type your institutional email
          </p>
          <label style={{color:"#607080",fontSize:11,letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:7}}>
            RFID Number / Email
          </label>
          <input ref={inputRef} value={rfidInput}
            onChange={e=>{setRfidInput(e.target.value);setLoginErr("");}}
            onKeyDown={e=>e.key==="Enter"&&submitID()}
            placeholder="e.g. ##-#####-### or name@neu.edu.ph"
            style={{width:"100%",background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.15)",
              borderRadius:10,color:"#fff",padding:"12px 14px",fontSize:14,outline:"none",
              fontFamily:"monospace",letterSpacing:.8}}/>

          {loginErr && <div style={{background:"rgba(192,57,43,.15)",border:"1px solid rgba(192,57,43,.35)",
            borderRadius:9,padding:"11px 14px",marginTop:13,color:"#ff8888",fontSize:13,lineHeight:1.5}}>{loginErr}</div>}

          <button onClick={submitID} style={{width:"100%",marginTop:18,padding:"13px",
            background:"linear-gradient(135deg,#1a73e8,#0d52c4)",color:"#fff",border:"none",
            borderRadius:11,fontSize:15,fontWeight:700,cursor:"pointer",
            boxShadow:"0 4px 18px rgba(26,115,232,.45)"}}>
            Continue →
          </button>

        </>) : (<>
          <div style={{background:"rgba(26,115,232,.1)",border:"1px solid rgba(26,115,232,.25)",
            borderRadius:11,padding:"13px 16px",marginBottom:20}}>
            <p style={{color:"#6aacff",fontSize:12,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Logged in as</p>
            <p style={{color:"#fff",fontWeight:700,fontSize:15}}>{rfidInput}</p>
          </div>

          {/* Email */}
          <label style={{color:"#607080",fontSize:11,letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:6}}>Email Address</label>
          <input value={visitorEmail}
            onChange={e=>{setVisitorEmail(e.target.value);setLoginErr("");}}
            placeholder="e.g. name@neu.edu.ph"
            style={{width:"100%",background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.15)",
              borderRadius:10,color:"#fff",padding:"11px 14px",fontSize:14,outline:"none",marginBottom:13}}/>

          {/* Name */}
          <label style={{color:"#607080",fontSize:11,letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:6}}>Full Name</label>
          <input autoFocus value={visitorName}
            onChange={e=>{setVisitorName(e.target.value);setLoginErr("");}}
            placeholder="e.g. Juan dela Cruz"
            style={{width:"100%",background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.15)",
              borderRadius:10,color:"#fff",padding:"11px 14px",fontSize:14,outline:"none",marginBottom:13}}/>

          {/* Year Level + Program side by side */}
          <div style={{display:"flex",gap:10,marginBottom:13}}>
            <div style={{flex:1}}>
              <label style={{color:"#607080",fontSize:11,letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:6}}>Year Level</label>
              <select value={yearLevel} onChange={e=>{
                  const val = e.target.value;
                  setYearLevel(val);
                  if(["Integrated School","Graduate","Staff","Faculty"].includes(val)) setProgram("");
                  setLoginErr("");
                }}
                style={{width:"100%",background:"rgba(20,30,50,.9)",border:"1px solid rgba(255,255,255,.15)",
                  borderRadius:10,color:yearLevel?"#fff":"#607080",padding:"11px 12px",fontSize:14,outline:"none"}}>
                <option value="" disabled>Select…</option>
                <option value="1st Year">1st Year</option>
                <option value="2nd Year">2nd Year</option>
                <option value="3rd Year">3rd Year</option>
                <option value="4th Year">4th Year</option>
                <option value="Irregular">Irregular</option>
                <option value="Graduate">Graduate</option>
                <option value="Integrated School">Integrated School</option>
                <option value="Faculty">Faculty</option>
                <option value="Staff">Staff</option>
              </select>
            </div>
            <div style={{flex:2}}>
              <label style={{color:"#607080",fontSize:11,letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:6}}>Program</label>
              {["Integrated School","Graduate","Staff","Faculty"].includes(yearLevel) ? (
                <div style={{width:"100%",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.08)",
                  borderRadius:10,color:"#607080",padding:"11px 14px",fontSize:14,fontStyle:"italic"}}>
                  N/A
                </div>
              ) : (
                <input value={program}
                  onChange={e=>{setProgram(e.target.value);setLoginErr("");}}
                  placeholder="e.g. BSIT, BSCS, BSA…"
                  style={{width:"100%",background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.15)",
                    borderRadius:10,color:"#fff",padding:"11px 14px",fontSize:14,outline:"none"}}/>
              )}
            </div>
          </div>

          {/* Reason */}
          <label style={{color:"#607080",fontSize:11,letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:6}}>
            Purpose of Visit
          </label>
          <input value={reason}
            onChange={e=>{setReason(e.target.value);setLoginErr("");}}
            onKeyDown={e=>e.key==="Enter"&&submitReason()}
            placeholder="Type or pick below…"
            style={{width:"100%",background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.15)",
              borderRadius:10,color:"#fff",padding:"11px 14px",fontSize:14,outline:"none"}}/>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:9}}>
            {REASONS.map(r=>(
              <button key={r} onClick={()=>setReason(r)} style={{
                padding:"5px 13px",fontSize:12,borderRadius:20,cursor:"pointer",
                border:"1px solid rgba(26,115,232,.4)",
                background:reason===r?"rgba(26,115,232,.3)":"rgba(255,255,255,.05)",
                color:reason===r?"#fff":"#7aacff",transition:"all .15s"}}>
                {r}
              </button>
            ))}
          </div>

          {loginErr && <div style={{background:"rgba(192,57,43,.15)",border:"1px solid rgba(192,57,43,.35)",
            borderRadius:9,padding:"11px 14px",marginTop:13,color:"#ff8888",fontSize:13}}>{loginErr}</div>}

          <button onClick={submitReason} style={{width:"100%",marginTop:18,padding:"13px",
            background:"linear-gradient(135deg,#0d7c5f,#0a6050)",color:"#fff",border:"none",
            borderRadius:11,fontSize:15,fontWeight:700,cursor:"pointer",
            boxShadow:"0 4px 18px rgba(13,124,95,.4)"}}>
            ✓ Enter Library
          </button>
          <button onClick={()=>{setLoginStep(1);setCurrentUser(null);setRfidInput("");setLoginErr("");
            setVisitorName("");setVisitorEmail("");setYearLevel("");setProgram("");}}
            style={{width:"100%",marginTop:10,padding:"10px",background:"transparent",
              color:"#607080",border:"1px solid rgba(255,255,255,.09)",borderRadius:10,fontSize:13,cursor:"pointer"}}>
            ← Back
          </button>
        </>)}
      </div>

      <button onClick={()=>setShowAdminModal(true)}
        style={{marginTop:26,background:"transparent",border:"none",color:"#2a3a4a",
          fontSize:12,cursor:"pointer",letterSpacing:1.5,textTransform:"uppercase",zIndex:1}}>
        ⚙ Admin Access
      </button>

      {/* Admin login modal */}
      {showAdminModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",
          display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"#111827",border:"1px solid rgba(255,255,255,.15)",
            borderRadius:18,padding:34,width:330,boxShadow:"0 24px 64px rgba(0,0,0,.5)"}}>
            <h3 style={{color:"#fff",marginBottom:18,fontSize:18}}>🔒 Admin Login</h3>
            <input autoFocus type="password" placeholder="Enter password"
              value={adminPass}
              onChange={e=>{setAdminPass(e.target.value);setAdminErr("");}}
              onKeyDown={e=>e.key==="Enter"&&doAdminLogin()}
              style={{width:"100%",background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.2)",
                borderRadius:9,color:"#fff",padding:"11px 13px",fontSize:14,outline:"none"}}/>
            {adminErr && <p style={{color:"#ff8888",fontSize:13,marginTop:9}}>{adminErr}</p>}
            <div style={{display:"flex",gap:10,marginTop:18}}>
              <button onClick={doAdminLogin} style={{flex:1,padding:"11px",background:"#1a73e8",
                color:"#fff",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700}}>Login</button>
              <button onClick={()=>{setShowAdminModal(false);setAdminPass("");setAdminErr("");}}
                style={{flex:1,padding:"11px",background:"rgba(255,255,255,.08)",color:"#aaa",
                  border:"none",borderRadius:9,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );

  // ════════════════════════════════════════════════════════════════════════
  // SCREEN: WELCOME
  // ════════════════════════════════════════════════════════════════════════
  if (screen === "welcome") return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0d3b66,#0a6050)",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      color:"#fff",textAlign:"center",padding:20}}>
      <div style={{fontSize:86,marginBottom:22,animation:"pop .5s cubic-bezier(.36,.07,.19,.97)"}}>👋</div>
      <h1 style={{fontSize:38,fontWeight:700,marginBottom:8}}>Welcome to NEU Library!</h1>
      <p style={{fontSize:22,color:"rgba(255,255,255,.85)",marginBottom:6}}>{currentUser?.name}</p>
      <p style={{fontSize:16,color:"rgba(255,255,255,.6)"}}>{currentUser?.program}</p>
      <div style={{marginTop:28,background:"rgba(255,255,255,.12)",borderRadius:12,
        padding:"14px 32px",fontSize:15,color:"rgba(255,255,255,.8)"}}>
        Purpose: <strong style={{color:"#fff"}}>{reason}</strong>
      </div>
      <p style={{marginTop:36,color:"rgba(255,255,255,.35)",fontSize:13,letterSpacing:1}}>
        Auto-returning in a moment…
      </p>
    </div>
  );

  // ════════════════════════════════════════════════════════════════════════
  // SCREEN: ADMIN
  // ════════════════════════════════════════════════════════════════════════
  return (
    <div style={{minHeight:"100vh",background:"#f0f4f8",display:"flex",flexDirection:"column"}}>

      {/* Top Nav */}
      <div style={{background:"#0d3b66",padding:"0 24px",display:"flex",alignItems:"center",
        gap:6,height:60,boxShadow:"0 2px 14px rgba(0,0,0,.25)",flexShrink:0}}>
        <span style={{fontSize:22,marginRight:6}}>📚</span>
        <span style={{color:"#fff",fontWeight:700,fontSize:17,marginRight:"auto"}}>NEU Library Admin</span>
        {[
          {id:"dashboard", label:"📊 Dashboard"},
          {id:"logs",      label:"📋 Visitor Logs"},
          {id:"visitors",  label:"👥 Visitors"},
        ].map(t=>(
          <button key={t.id} onClick={()=>setAdminTab(t.id)} style={{
            padding:"8px 18px",borderRadius:8,border:"none",cursor:"pointer",fontSize:14,
            background:adminTab===t.id?"rgba(255,255,255,.18)":"transparent",
            color:adminTab===t.id?"#fff":"rgba(255,255,255,.55)",
            fontWeight:adminTab===t.id?700:400}}>
            {t.label}
          </button>
        ))}
        <button onClick={()=>{setScreen("login");setAdminTab("dashboard");}}
          style={{marginLeft:10,padding:"8px 16px",borderRadius:8,
            background:"rgba(192,57,43,.22)",border:"1px solid rgba(192,57,43,.4)",
            color:"#ffaaaa",cursor:"pointer",fontSize:13}}>
          Sign Out
        </button>
      </div>

      <div style={{flex:1,padding:28,maxWidth:1120,width:"100%",margin:"0 auto",overflowY:"auto"}}>

        {/* ── DASHBOARD ── */}
        {adminTab==="dashboard" && (<>
          <h2 style={{color:"#0d3b66",marginBottom:24,fontSize:22}}>Library Statistics</h2>

          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,marginBottom:24}}>
            {[
              {label:"Today's Visitors", value:todayCt,  icon:"🌅", color:"#1a73e8"},
              {label:"This Week",        value:weekCt,   icon:"📅", color:"#0d7c5f"},
              {label:"This Month",       value:monthCt,  icon:"🗓️", color:"#7b2d8b"},
            ].map(c=>(
              <div key={c.label} style={{background:"#fff",borderRadius:16,padding:"24px 28px",
                boxShadow:"0 2px 12px rgba(0,0,0,.07)",borderLeft:`5px solid ${c.color}`}}>
                <div style={{fontSize:32,marginBottom:8}}>{c.icon}</div>
                <div style={{fontSize:42,fontWeight:800,color:c.color,lineHeight:1}}>{c.value}</div>
                <div style={{color:"#777",fontSize:14,marginTop:6}}>{c.label}</div>
              </div>
            ))}
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,marginBottom:24}}>
            {[
              {label:"Students",  type:"student",  color:"#1a73e8"},
              {label:"Faculty",   type:"faculty",  color:"#0d7c5f"},
              {label:"Employees", type:"employee", color:"#7b2d8b"},
            ].map(t=>(
              <div key={t.type} style={{background:"#fff",borderRadius:14,padding:"20px 24px",
                boxShadow:"0 2px 12px rgba(0,0,0,.07)",textAlign:"center",border:`2px solid ${t.color}22`}}>
                <div style={{fontSize:32,fontWeight:800,color:t.color}}>{typeToday[t.type]||0}</div>
                <div style={{color:"#777",fontSize:13,marginTop:4}}>{t.label} today</div>
              </div>
            ))}
          </div>

          <div style={{background:"#fff",borderRadius:16,padding:24,boxShadow:"0 2px 12px rgba(0,0,0,.07)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{color:"#0d3b66",fontSize:16}}>Recent Visits</h3>
              <button onClick={()=>setAdminTab("logs")} style={{color:"#1a73e8",background:"none",
                border:"none",cursor:"pointer",fontSize:13}}>View all →</button>
            </div>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead>
                <tr style={{borderBottom:"2px solid #eee"}}>
                  {["Name","Year Level","Program","Type","Reason","Time"].map(h=>(
                    <th key={h} style={{textAlign:"left",padding:"8px 12px",color:"#999",fontSize:11,
                      textTransform:"uppercase",letterSpacing:.8}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {logs.slice(0,7).map(l=>(
                  <tr key={l.id} style={{borderBottom:"1px solid #f2f2f2"}}>
                    <td style={{padding:"11px 12px",color:"#1a1a2e",fontWeight:600}}>{l.name}</td>
                    <td style={{padding:"11px 12px",color:"#555"}}>{l.yearLevel||"—"}</td>
                    <td style={{padding:"11px 12px",color:"#555"}}>{l.program}</td>
                    <td style={{padding:"11px 12px"}}>{badge(l.type,l.type)}</td>
                    <td style={{padding:"11px 12px",color:"#555"}}>{l.reason}</td>
                    <td style={{padding:"11px 12px",color:"#999",fontSize:13}}>{fmt(l.timestamp)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>)}

        {/* ── VISITOR LOGS ── */}
        {adminTab==="logs" && (<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <h2 style={{color:"#0d3b66",fontSize:22}}>Visitor Logs</h2>
            <button onClick={()=>exportPDF(filtered,`Logs (${period})`)} style={{
              padding:"10px 22px",background:"#0d3b66",color:"#fff",border:"none",
              borderRadius:9,cursor:"pointer",fontSize:13,fontWeight:700,
              boxShadow:"0 2px 10px rgba(13,59,102,.3)"}}>
              📄 Export PDF
            </button>
          </div>

          {/* Filters */}
          <div style={{background:"#fff",borderRadius:14,padding:"18px 20px",marginBottom:20,
            boxShadow:"0 2px 12px rgba(0,0,0,.07)",display:"flex",gap:14,flexWrap:"wrap",alignItems:"flex-end"}}>
            <div style={{flex:"2 1 200px"}}>
              <label style={{color:"#999",fontSize:11,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:7}}>Search</label>
              <input value={searchQ} onChange={e=>setSearchQ(e.target.value)}
                placeholder="Name, program, or reason…"
                style={{width:"100%",border:"1px solid #dde",borderRadius:8,padding:"10px 12px",
                  fontSize:14,outline:"none",color:"#333"}}/>
            </div>
            <div style={{flex:"1 1 150px"}}>
              <label style={{color:"#999",fontSize:11,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:7}}>Period</label>
              <select value={period} onChange={e=>setPeriod(e.target.value)}
                style={{width:"100%",border:"1px solid #dde",borderRadius:8,padding:"10px 12px",
                  fontSize:14,outline:"none",color:"#333",background:"#fff"}}>
                <option value="today">Today</option>
                <option value="week">This Week</option>
                <option value="month">This Month</option>
                <option value="range">Custom Range</option>
                <option value="all">All Time</option>
              </select>
            </div>
            {period==="range" && <>
              <div>
                <label style={{color:"#999",fontSize:11,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:7}}>From</label>
                <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}
                  style={{border:"1px solid #dde",borderRadius:8,padding:"10px 12px",fontSize:14,outline:"none",color:"#333"}}/>
              </div>
              <div>
                <label style={{color:"#999",fontSize:11,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:7}}>To</label>
                <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}
                  style={{border:"1px solid #dde",borderRadius:8,padding:"10px 12px",fontSize:14,outline:"none",color:"#333"}}/>
              </div>
            </>}
          </div>

          <div style={{background:"#fff",borderRadius:14,boxShadow:"0 2px 12px rgba(0,0,0,.07)",overflow:"hidden"}}>
            <div style={{padding:"13px 20px",borderBottom:"1px solid #eee",color:"#888",fontSize:13}}>
              Showing <strong style={{color:"#0d3b66"}}>{filtered.length}</strong> record{filtered.length!==1?"s":""}
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:600}}>
                <thead>
                  <tr style={{background:"#f8fafc",borderBottom:"2px solid #eee"}}>
                    {["Name","Year Level","Program","Type","Reason","Date & Time"].map(h=>(
                      <th key={h} style={{textAlign:"left",padding:"12px 16px",color:"#999",
                        fontSize:11,textTransform:"uppercase",letterSpacing:.8,whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.length===0
                    ? <tr><td colSpan={6} style={{padding:36,textAlign:"center",color:"#bbb",fontSize:15}}>No records found.</td></tr>
                    : filtered.map(l=>(
                      <tr key={l.id} style={{borderBottom:"1px solid #f2f2f2"}}>
                        <td style={{padding:"12px 16px",fontWeight:600,color:"#1a1a2e"}}>{l.name}</td>
                        <td style={{padding:"12px 16px",color:"#555"}}>{l.yearLevel||"—"}</td>
                        <td style={{padding:"12px 16px",color:"#555"}}>{l.program}</td>
                        <td style={{padding:"12px 16px"}}>{badge(l.type,l.type)}</td>
                        <td style={{padding:"12px 16px",color:"#555"}}>{l.reason}</td>
                        <td style={{padding:"12px 16px",color:"#999",fontSize:13,whiteSpace:"nowrap"}}>{fmt(l.timestamp)}</td>
                      </tr>
                    ))
                  }
                </tbody>
              </table>
            </div>
          </div>
        </>)}

        {/* ── VISITOR MANAGEMENT ── */}
        {adminTab==="visitors" && (<>
          <h2 style={{color:"#0d3b66",marginBottom:20,fontSize:22}}>Visitor Management</h2>
          <div style={{background:"#fff",borderRadius:14,boxShadow:"0 2px 12px rgba(0,0,0,.07)",overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
                <thead>
                  <tr style={{background:"#f8fafc",borderBottom:"2px solid #eee"}}>
                    {["RFID","Name","Email","Program","Type","Status","Action"].map(h=>(
                      <th key={h} style={{textAlign:"left",padding:"12px 16px",color:"#999",
                        fontSize:11,textTransform:"uppercase",letterSpacing:.8,whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {visitors.map(v=>(
                    <tr key={v.id} style={{borderBottom:"1px solid #f2f2f2",background:v.blocked?"#fff8f8":"transparent"}}>
                      <td style={{padding:"12px 16px",fontFamily:"monospace",fontSize:13,color:"#555"}}>{v.rfid}</td>
                      <td style={{padding:"12px 16px",fontWeight:600,color:"#1a1a2e"}}>{v.name}</td>
                      <td style={{padding:"12px 16px",color:"#666",fontSize:13}}>{v.email}</td>
                      <td style={{padding:"12px 16px",color:"#555"}}>{v.program}</td>
                      <td style={{padding:"12px 16px"}}>{badge(v.type,v.type)}</td>
                      <td style={{padding:"12px 16px"}}>{badge(v.blocked?"Blocked":"Active",v.blocked?"blocked":"active")}</td>
                      <td style={{padding:"12px 16px"}}>
                        <button onClick={()=>setBlockTarget(v)} style={{
                          padding:"6px 16px",borderRadius:7,border:"none",cursor:"pointer",
                          fontSize:12,fontWeight:700,
                          background:v.blocked?"rgba(13,124,95,.12)":"rgba(192,57,43,.1)",
                          color:v.blocked?"#0d7c5f":"#c0392b"}}>
                          {v.blocked?"Unblock":"Block"}
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </>)}
      </div>

      {/* Block/Unblock Modal */}
      {blockTarget && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",
          display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
          <div style={{background:"#fff",borderRadius:18,padding:34,width:370,
            boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}>
            <h3 style={{color:"#1a1a2e",marginBottom:14,fontSize:18}}>
              {blockTarget.blocked ? "Unblock Visitor" : "Block Visitor"}
            </h3>
            <p style={{color:"#555",marginBottom:10,lineHeight:1.6}}>
              {blockTarget.blocked
                ? `Allow ${blockTarget.name} to access the library again?`
                : `Block ${blockTarget.name} from entering the library?`}
            </p>
            {!blockTarget.blocked && (
              <div style={{background:"#fff5f5",border:"1px solid #fcc",borderRadius:9,
                padding:"11px 14px",color:"#c0392b",fontSize:13,lineHeight:1.6}}>
                ⚠️ This user will see "Not allowed to use library" on their next login attempt.
              </div>
            )}
            <div style={{display:"flex",gap:10,marginTop:22}}>
              <button onClick={()=>toggleBlock(blockTarget.id)} style={{flex:1,padding:"12px",
                borderRadius:9,border:"none",cursor:"pointer",fontWeight:700,fontSize:15,
                background:blockTarget.blocked?"#0d7c5f":"#c0392b",color:"#fff"}}>
                {blockTarget.blocked?"Yes, Unblock":"Yes, Block"}
              </button>
              <button onClick={()=>setBlockTarget(null)} style={{flex:1,padding:"12px",
                borderRadius:9,background:"#f0f0f0",border:"none",cursor:"pointer",color:"#555",fontSize:15}}>
                Cancel
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
